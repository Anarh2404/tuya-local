name: Tuvio TUH07DE Humidifier
products:
  - id: ma3uzk3nvzpxhsbn
    manufacturer: Tuvio
    model: TUH07DE
entities:
  - entity: humidifier
    class: humidifier
    dps:
      - id: 1
        name: switch
        type: boolean
      - id: 13
        name: humidity
        type: integer
        range:
          min: 40
          max: 70
        mapping:
          - step: 5
      - id: 14
        name: current_humidity
        type: integer
      - id: 2
        name: mode
        type: boolean
        mapping:
          - dps_val: true
            value: auto
          - dps_val: false
            value: normal

  - entity: select
    name: Mist level
    icon: "mdi:spray"
    category: config
    dps:
      - id: 23
        name: option
        type: string
        mapping:
          - dps_val: level_1
            value: low
          - dps_val: level_2
            value: medium
          - dps_val: level_3
            value: high

  - entity: light
    name: Tank light
    category: config
    dps:
      - id: 5
        name: switch
        type: boolean
      - id: 101
        name: brightness
        type: integer
        range:
          min: 1
          max: 100

  - entity: switch
    name: Warm mist
    icon: "mdi:fire"
    category: config
    dps:
      - id: 26
        name: switch
        type: boolean

  - entity: switch
    name: UV
    icon: "mdi:sun-wireless-outline"
    category: config
    dps:
      - id: 25
        name: switch
        type: boolean

  - entity: switch
    translation_key: sleep
    category: config
    dps:
      - id: 16
        name: switch
        type: boolean

  - entity: select
    translation_key: timer
    icon: "mdi:timer-outline"
    category: config
    dps:
      - id: 19
        name: option
        type: string
        mapping:
          - dps_val: cancel
            value: cancel
          - dps_val: "1H"
            value: "1h"
          - dps_val: "2H"
            value: "2h"
          - dps_val: "3H"
            value: "3h"
          - dps_val: "4H"
            value: "4h"
          - dps_val: "5H"
            value: "5h"
          - dps_val: "6H"
            value: "6h"
          - dps_val: "7H"
            value: "7h"
          - dps_val: "8H"
            value: "8h"
          - dps_val: "9H"
            value: "9h"
          - dps_val: "10H"
            value: "10h"
          - dps_val: "11H"
            value: "11h"
          - dps_val: "12H"
            value: "12h"

  - entity: sensor
    name: Timer remaining
    icon: "mdi:timer"
    class: duration
    category: diagnostic
    dps:
      - id: 102
        name: sensor
        type: integer
        unit: h

  - entity: binary_sensor
    translation_key: tank_empty
    category: diagnostic
    dps:
      - id: 22
        name: sensor
        type: bitfield
        mapping:
          - dps_val: 0
            value: false
          - value: true

  - entity: sensor
    name: Fault code
    icon: "mdi:alert"
    class: problem
    category: diagnostic
    dps:
      - id: 22
        name: sensor
        type: integer
